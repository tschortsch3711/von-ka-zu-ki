name: Deploy to GitHub Pages

on:
  # Bei jedem Push auf main bauen und deployen
  push:
    branches: [main]
  # Manuelles Ausloesen ueber die Actions-Oberflaeche erlauben
  workflow_dispatch:

# Berechtigungen, die GitHub Pages Deployment benoetigt
permissions:
  contents: read
  pages: write
  id-token: write

# Nur ein gleichzeitiges Deployment, laufende werden nicht abgebrochen
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Configure Pages
        uses: actions/configure-pages@v5
      - name: Build with Astro
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
